<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configuração CRÍTICA para funcionar perfeitamente em celulares -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nosso App 💖</title>
    
    <!-- Tailwind CSS para o visual moderno (UI/UX) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS para o Mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDK (Compat version para usar direto no HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* Ajustes de identidade visual e UI */
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f8fafc; }
        #map { z-index: 10; height: 100%; width: 100%; }
        
        /* Oculta scrollbar mas permite scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animações de entrada para os Modais */
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Marcador customizado do mapa (Coração) */
        .custom-marker {
            background: #e11d48;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* Margem inferior para não sobrepor a barra de navegação */
        .pb-nav { padding-bottom: 80px; }
    </style>
</head>
<body class="text-slate-800 overflow-hidden h-screen w-screen flex flex-col">

    <!-- ÁREA 1: VISUALIZAÇÃO DO MAPA -->
    <div id="view-map" class="flex-1 relative h-full w-full">
        <div id="map"></div>
        
        <!-- Botão de GPS -->
        <button onclick="goToCurrentLocation()" class="absolute bottom-24 right-4 z-[400] bg-white p-3 rounded-full shadow-lg text-rose-500 hover:bg-rose-50 transition active:scale-95">
            <i data-lucide="navigation"></i>
        </button>
    </div>

    <!-- ÁREA 2: VISUALIZAÇÃO DE FILMES -->
    <div id="view-movies" class="flex-1 hidden h-full w-full bg-slate-50 overflow-y-auto pb-nav no-scrollbar">
        <!-- Header Filmes -->
        <div class="bg-white px-6 pt-12 pb-4 shadow-sm sticky top-0 z-20 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-800">Cine Casal 🍿</h1>
            <button onclick="openSettingsModal()" class="text-slate-400 hover:text-rose-500 transition">
                <i data-lucide="settings"></i>
            </button>
        </div>

        <!-- Filtros/Abas de Filmes -->
        <div class="px-6 py-4 flex gap-4">
            <button id="filter-all" onclick="filterMovies('all')" class="px-4 py-2 rounded-full text-sm font-semibold bg-rose-500 text-white shadow-md transition">Todos</button>
            <button id="filter-want" onclick="filterMovies('want')" class="px-4 py-2 rounded-full text-sm font-semibold bg-white text-slate-600 border border-slate-200 transition">Quero Assistir</button>
            <button id="filter-watched" onclick="filterMovies('watched')" class="px-4 py-2 rounded-full text-sm font-semibold bg-white text-slate-600 border border-slate-200 transition">Já Assistimos</button>
        </div>

        <!-- Lista de Filmes (Grid) -->
        <div id="movies-list" class="grid grid-cols-2 sm:grid-cols-3 gap-4 px-6 pb-6">
            <!-- Filmes aparecerão aqui -->
        </div>

        <!-- FAB (Botão flutuante para adicionar filme) -->
        <button onclick="openMovieSearchModal()" class="fixed bottom-24 right-6 z-[400] bg-rose-500 p-4 rounded-full shadow-lg shadow-rose-200 text-white hover:bg-rose-600 transition active:scale-95">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- NAVEGAÇÃO INFERIOR -->
    <div class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 px-6 py-3 flex justify-around items-center z-[500] pb-safe">
        <button onclick="switchTab('map')" id="tab-map" class="flex flex-col items-center text-rose-500 transition">
            <i data-lucide="map" class="w-6 h-6 mb-1"></i>
            <span class="text-xs font-semibold">Nosso Mapa</span>
        </button>
        <button onclick="switchTab('movies')" id="tab-movies" class="flex flex-col items-center text-slate-400 hover:text-rose-500 transition">
            <i data-lucide="film" class="w-6 h-6 mb-1"></i>
            <span class="text-xs font-semibold">Cine Casal</span>
        </button>
    </div>

    <!-- MODAL: ADICIONAR MEMÓRIA NO MAPA -->
    <div id="memory-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl modal-enter">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">Nova Memória 📍</h2>
                <button onclick="closeMemoryModal()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-full"><i data-lucide="x"></i></button>
            </div>
            
            <input type="text" id="mem-title" placeholder="Nome do lugar..." class="w-full mb-3 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-rose-400 focus:ring-1 focus:ring-rose-400">
            <input type="date" id="mem-date" class="w-full mb-3 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
            <textarea id="mem-note" placeholder="Escreva uma notinha fofa..." rows="3" class="w-full mb-3 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none resize-none"></textarea>
            
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-600 mb-2">Adicionar Foto (Câmera/Galeria)</label>
                <input type="file" id="mem-photo" accept="image/*" capture="environment" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-rose-50 file:text-rose-700 hover:file:bg-rose-100">
            </div>

            <button onclick="saveMemory()" class="w-full bg-rose-500 text-white font-bold py-3 rounded-xl shadow-md hover:bg-rose-600 active:scale-95 transition">Salvar Memória ❤️</button>
        </div>
    </div>

    <!-- MODAL: VER DETALHES (MEMÓRIA OU FILME) -->
    <div id="details-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[1000] flex items-end sm:items-center justify-center sm:p-4">
        <div class="bg-white rounded-t-3xl sm:rounded-3xl p-6 w-full max-w-md shadow-2xl modal-enter max-h-[90vh] overflow-y-auto pb-8">
            <div class="flex justify-between items-start mb-4">
                <h2 id="det-title" class="text-2xl font-bold text-slate-800 pr-4">Título</h2>
                <button onclick="closeDetailsModal()" class="text-slate-400 bg-slate-100 p-2 rounded-full shrink-0"><i data-lucide="x"></i></button>
            </div>
            
            <!-- Badges e Data -->
            <div class="flex flex-wrap gap-2 mb-4 text-sm">
                <span id="det-date" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full font-medium"></span>
                <span id="det-status" class="hidden px-3 py-1 bg-rose-100 text-rose-700 rounded-full font-medium"></span>
                <span id="det-rating" class="hidden px-3 py-1 bg-amber-100 text-amber-700 rounded-full font-medium flex items-center gap-1"></span>
            </div>

            <!-- Imagem -->
            <img id="det-photo" src="" class="w-full h-48 object-cover rounded-2xl shadow-sm mb-4 hidden">
            
            <!-- Descrição / Resenha -->
            <p id="det-note" class="text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100"></p>

            <button id="det-delete-btn" class="w-full mt-6 flex items-center justify-center gap-2 text-red-500 font-semibold py-3 rounded-xl bg-red-50 hover:bg-red-100 transition">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Apagar
            </button>
        </div>
    </div>

    <!-- MODAL: PESQUISAR FILME (TMDb) -->
    <div id="movie-search-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[1000] flex items-start justify-center p-4 pt-10">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl modal-enter">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">Buscar Filme 🍿</h2>
                <button onclick="closeMovieSearchModal()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-full"><i data-lucide="x"></i></button>
            </div>
            
            <div class="relative mb-4">
                <input type="text" id="movie-search-input" placeholder="Qual filme estão procurando?" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-rose-400 focus:ring-1 focus:ring-rose-400">
                <i data-lucide="search" class="absolute left-3 top-3.5 text-slate-400 w-5 h-5"></i>
            </div>
            
            <div id="movie-search-results" class="max-h-64 overflow-y-auto space-y-2 no-scrollbar">
                <!-- Resultados da busca aqui -->
                <p class="text-center text-slate-400 text-sm mt-4">Digite para buscar...</p>
            </div>
        </div>
    </div>

    <!-- MODAL: ADICIONAR FILME (FORMULÁRIO) -->
    <div id="movie-form-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl modal-enter max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-start mb-4">
                <div class="flex gap-4 items-center">
                    <img id="form-movie-poster" src="" class="w-16 h-24 object-cover rounded-lg shadow-md bg-slate-200">
                    <h2 id="form-movie-title" class="text-lg font-bold text-slate-800 leading-tight">Título</h2>
                </div>
                <button onclick="closeMovieFormModal()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-full"><i data-lucide="x"></i></button>
            </div>
            
            <!-- Status -->
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-600 mb-2">Status</label>
                <div class="flex gap-2">
                    <button id="btn-status-want" onclick="selectMovieStatus('want')" class="flex-1 py-2 rounded-xl text-sm font-semibold border-2 border-slate-200 text-slate-500 transition">Quero Assistir</button>
                    <button id="btn-status-watched" onclick="selectMovieStatus('watched')" class="flex-1 py-2 rounded-xl text-sm font-semibold border-2 border-slate-200 text-slate-500 transition">Já Assistimos</button>
                </div>
            </div>

            <!-- Campos extras que aparecem se "Já assistimos" -->
            <div id="watched-fields" class="hidden space-y-4 mb-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Nota (1 a 5)</label>
                    <div class="flex gap-2 text-slate-300" id="star-rating">
                        <i data-lucide="star" class="w-8 h-8 cursor-pointer hover:text-amber-400 fill-current" onclick="setRating(1)"></i>
                        <i data-lucide="star" class="w-8 h-8 cursor-pointer hover:text-amber-400 fill-current" onclick="setRating(2)"></i>
                        <i data-lucide="star" class="w-8 h-8 cursor-pointer hover:text-amber-400 fill-current" onclick="setRating(3)"></i>
                        <i data-lucide="star" class="w-8 h-8 cursor-pointer hover:text-amber-400 fill-current" onclick="setRating(4)"></i>
                        <i data-lucide="star" class="w-8 h-8 cursor-pointer hover:text-amber-400 fill-current" onclick="setRating(5)"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Quando assistimos?</label>
                    <input type="date" id="movie-date" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Comentário / Resenha</label>
                    <textarea id="movie-note" placeholder="O que acharam do filme?" rows="2" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-2">Foto de nós assistindo 📸</label>
                    <input type="file" id="movie-photo" accept="image/*" capture="environment" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-rose-50 file:text-rose-700 hover:file:bg-rose-100">
                </div>
            </div>

            <button onclick="saveMovie()" class="w-full mt-2 bg-rose-500 text-white font-bold py-3 rounded-xl shadow-md hover:bg-rose-600 active:scale-95 transition">Salvar Filme 🍿</button>
        </div>
    </div>

    <!-- MODAL: CONFIGURAÇÃO (API KEY) -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[1100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl modal-enter">
            <h2 class="text-xl font-bold text-slate-800 mb-2">Chave do TMDb ⚙️</h2>
            <p class="text-sm text-slate-500 mb-4">Cole a chave aqui. Ela será salva na nuvem para funcionar no celular do seu namorado também!</p>
            <input type="text" id="tmdb-key-input" placeholder="Cole a API Key (v3 auth) aqui..." class="w-full mb-4 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-rose-400">
            <div class="flex justify-end gap-2">
                <button onclick="closeSettingsModal()" class="px-4 py-2 rounded-xl font-semibold text-slate-500 bg-slate-100">Cancelar</button>
                <button onclick="saveApiKey()" class="px-4 py-2 rounded-xl font-semibold text-white bg-rose-500">Salvar na Nuvem</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializar os Ícones
        lucide.createIcons();

        // 1. INICIALIZAÇÃO DO FIREBASE (Usando seu banco Realtime Database)
        const firebaseConfig = {
            databaseURL: "https://nosso-app-7feab-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variáveis Globais
        let map;
        let markers = {}; 
        let tempLatLng = null;
        let tmdbApiKey = "";
        let moviesData = {};
        let currentMovieFilter = 'all';

        // Variáveis de Formulário de Filme
        let selectedMovieData = null;
        let selectedStatus = 'want';
        let selectedRating = 0;

        // 2. INICIALIZAÇÃO DO MAPA LEAFLET
        // tap: false ajuda MUITO na resposta de clique em celulares!
        map = L.map('map', { zoomControl: false, tap: false }).setView([-25.4284, -49.2733], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        // Evento de Clique no Mapa para Celular e PC
        map.on('click', function(e) {
            tempLatLng = e.latlng;
            document.getElementById('memory-modal').classList.remove('hidden');
            // Limpa os campos
            document.getElementById('mem-title').value = '';
            document.getElementById('mem-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('mem-note').value = '';
            document.getElementById('mem-photo').value = '';
        });

        // 3. COMPRESSOR DE IMAGENS (Essencial para não travar o banco de dados)
        function compressImage(file, callback) {
            if (!file) { callback(null); return; }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600; // Tamanho máximo da foto
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.6)); // Qualidade 60%
                };
            };
        }

        // 4. LÓGICA DO MAPA (Memórias)
        function saveMemory() {
            const title = document.getElementById('mem-title').value;
            const date = document.getElementById('mem-date').value;
            const note = document.getElementById('mem-note').value;
            const file = document.getElementById('mem-photo').files[0];

            if (!title) { alert('Dê um nome para este lugar! 💖'); return; }

            const memoryId = 'mem_' + Date.now();
            const memoryData = { title, date, note, lat: tempLatLng.lat, lng: tempLatLng.lng };

            compressImage(file, (compressedBase64) => {
                if (compressedBase64) memoryData.photo = compressedBase64;
                
                // Salvar no Firebase
                db.ref('memories/' + memoryId).set(memoryData);
                closeMemoryModal();
            });
        }

        // Sincronização em Tempo Real do Mapa
        db.ref('memories').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            // Limpar marcadores velhos
            for (let id in markers) { map.removeLayer(markers[id]); }
            markers = {};

            // Criar novos
            for (let id in data) {
                const mem = data[id];
                const icon = L.divIcon({
                    className: 'custom-icon',
                    html: `<div class="custom-marker" style="width:30px; height:30px;"><i data-lucide="heart" style="width:16px; height:16px; fill: white;"></i></div>`,
                    iconSize: [30, 30],
                    iconAnchor: [15, 30]
                });

                const marker = L.marker([mem.lat, mem.lng], { icon: icon }).addTo(map);
                
                // Clique no marcador para ver detalhes
                marker.on('click', () => {
                    document.getElementById('det-title').innerText = mem.title;
                    
                    const [year, month, day] = mem.date.split('-');
                    document.getElementById('det-date').innerText = mem.date ? `📅 ${day}/${month}/${year}` : '';
                    
                    document.getElementById('det-note').innerText = mem.note || 'Sem notinha...';
                    
                    const photoEl = document.getElementById('det-photo');
                    if (mem.photo) {
                        photoEl.src = mem.photo;
                        photoEl.classList.remove('hidden');
                    } else {
                        photoEl.classList.add('hidden');
                    }
                    
                    // Esconder itens de filmes no modal
                    document.getElementById('det-status').classList.add('hidden');
                    document.getElementById('det-rating').classList.add('hidden');

                    document.getElementById('det-delete-btn').onclick = () => {
                        if(confirm('Apagar esta memória? 😢')) {
                            db.ref('memories/' + id).remove();
                            closeDetailsModal();
                        }
                    };

                    document.getElementById('details-modal').classList.remove('hidden');
                });
                markers[id] = marker;
            }
            lucide.createIcons();
        });

        // GPS
        function goToCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        map.flyTo([position.coords.latitude, position.coords.longitude], 15);
                    },
                    (error) => { alert('Não conseguimos acessar sua localização. Verifique as permissões do celular!'); }
                );
            }
        }

        // 5. LÓGICA DE CONFIGURAÇÃO (API KEY NA NUVEM)
        db.ref('settings/tmdbKey').on('value', (snapshot) => {
            tmdbApiKey = snapshot.val() || "";
            document.getElementById('tmdb-key-input').value = tmdbApiKey;
        });

        function saveApiKey() {
            const key = document.getElementById('tmdb-key-input').value.trim();
            db.ref('settings/tmdbKey').set(key);
            closeSettingsModal();
            alert('Chave salva na nuvem com sucesso! 🚀');
        }

        // 6. LÓGICA DE FILMES (TMDb + Firebase)
        const searchInput = document.getElementById('movie-search-input');
        const resultsDiv = document.getElementById('movie-search-results');

        // Busca com atraso (debounce) para não bugar a API
        let searchTimeout = null;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if(query.length < 3) { resultsDiv.innerHTML = '<p class="text-center text-slate-400 text-sm mt-4">Digite mais para buscar...</p>'; return; }
            
            searchTimeout = setTimeout(() => {
                if(!tmdbApiKey) { resultsDiv.innerHTML = '<p class="text-center text-red-400 text-sm mt-4">Falta a chave da API (⚙️)!</p>'; return; }
                
                fetch(`https://api.themoviedb.org/3/search/movie?api_key=${tmdbApiKey}&language=pt-BR&query=${encodeURIComponent(query)}`)
                .then(r => r.json())
                .then(data => {
                    resultsDiv.innerHTML = '';
                    if(data.results.length === 0) {
                        resultsDiv.innerHTML = '<p class="text-center text-slate-400 text-sm mt-4">Nenhum filme encontrado...</p>';
                        return;
                    }
                    data.results.forEach(m => {
                        if(!m.poster_path) return;
                        const posterUrl = `https://image.tmdb.org/t/p/w92${m.poster_path}`;
                        const year = m.release_date ? m.release_date.split('-')[0] : 'N/A';
                        
                        const div = document.createElement('div');
                        div.className = "flex items-center gap-3 p-2 hover:bg-slate-50 rounded-xl cursor-pointer border border-transparent hover:border-slate-100 transition";
                        div.innerHTML = `
                            <img src="${posterUrl}" class="w-12 h-16 object-cover rounded shadow-sm bg-slate-200">
                            <div>
                                <h3 class="font-bold text-slate-700 text-sm leading-tight">${m.title}</h3>
                                <p class="text-xs text-slate-400">${year}</p>
                            </div>
                        `;
                        div.onclick = () => openMovieForm(m);
                        resultsDiv.appendChild(div);
                    });
                });
            }, 500);
        });

        // Abrir formulário do filme selecionado
        function openMovieForm(movieData) {
            closeMovieSearchModal();
            selectedMovieData = movieData;
            
            document.getElementById('form-movie-title').innerText = movieData.title;
            document.getElementById('form-movie-poster').src = `https://image.tmdb.org/t/p/w154${movieData.poster_path}`;
            
            // Resetar formulário
            selectMovieStatus('want');
            setRating(0);
            document.getElementById('movie-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('movie-note').value = '';
            document.getElementById('movie-photo').value = '';
            
            document.getElementById('movie-form-modal').classList.remove('hidden');
        }

        function selectMovieStatus(status) {
            selectedStatus = status;
            const btnWant = document.getElementById('btn-status-want');
            const btnWatched = document.getElementById('btn-status-watched');
            const extraFields = document.getElementById('watched-fields');

            if(status === 'want') {
                btnWant.classList.add('border-rose-500', 'text-rose-500', 'bg-rose-50');
                btnWant.classList.remove('border-slate-200', 'text-slate-500');
                btnWatched.classList.remove('border-rose-500', 'text-rose-500', 'bg-rose-50');
                btnWatched.classList.add('border-slate-200', 'text-slate-500');
                extraFields.classList.add('hidden');
            } else {
                btnWatched.classList.add('border-rose-500', 'text-rose-500', 'bg-rose-50');
                btnWatched.classList.remove('border-slate-200', 'text-slate-500');
                btnWant.classList.remove('border-rose-500', 'text-rose-500', 'bg-rose-50');
                btnWant.classList.add('border-slate-200', 'text-slate-500');
                extraFields.classList.remove('hidden');
            }
        }

        function setRating(stars) {
            selectedRating = stars;
            const starElements = document.getElementById('star-rating').children;
            for(let i=0; i<5; i++) {
                if(i < stars) {
                    starElements[i].classList.add('text-amber-400');
                    starElements[i].classList.remove('text-slate-300');
                } else {
                    starElements[i].classList.remove('text-amber-400');
                    starElements[i].classList.add('text-slate-300');
                }
            }
        }

        function saveMovie() {
            const movieId = 'mov_' + selectedMovieData.id;
            const file = document.getElementById('movie-photo').files[0];
            
            const moviePayload = {
                id: selectedMovieData.id,
                title: selectedMovieData.title,
                poster: `https://image.tmdb.org/t/p/w342${selectedMovieData.poster_path}`,
                status: selectedStatus,
                timestamp: Date.now()
            };

            if(selectedStatus === 'watched') {
                moviePayload.rating = selectedRating;
                moviePayload.date = document.getElementById('movie-date').value;
                moviePayload.note = document.getElementById('movie-note').value;
                
                compressImage(file, (compressedBase64) => {
                    if (compressedBase64) moviePayload.photo = compressedBase64;
                    db.ref('movies/' + movieId).set(moviePayload);
                    closeMovieFormModal();
                });
            } else {
                db.ref('movies/' + movieId).set(moviePayload);
                closeMovieFormModal();
            }
        }

        // Sincronização em Tempo Real dos Filmes
        db.ref('movies').on('value', (snapshot) => {
            moviesData = snapshot.val() || {};
            renderMovies();
        });

        function filterMovies(filter) {
            currentMovieFilter = filter;
            // Estilizar botões
            const buttons = {
                'all': document.getElementById('filter-all'),
                'want': document.getElementById('filter-want'),
                'watched': document.getElementById('filter-watched')
            };
            
            for(let key in buttons) {
                if(key === filter) {
                    buttons[key].className = "px-4 py-2 rounded-full text-sm font-semibold bg-rose-500 text-white shadow-md transition";
                } else {
                    buttons[key].className = "px-4 py-2 rounded-full text-sm font-semibold bg-white text-slate-600 border border-slate-200 transition";
                }
            }
            renderMovies();
        }

        function renderMovies() {
            const listDiv = document.getElementById('movies-list');
            listDiv.innerHTML = '';
            
            // Transformar objeto em array e ordernar do mais novo pro mais velho
            let moviesArray = Object.keys(moviesData).map(k => ({...moviesData[k], key: k}));
            moviesArray.sort((a,b) => b.timestamp - a.timestamp);

            moviesArray.forEach(m => {
                if(currentMovieFilter !== 'all' && m.status !== currentMovieFilter) return;

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden cursor-pointer hover:shadow-md transition flex flex-col";
                card.onclick = () => openMovieDetails(m.key);
                
                let extraBadge = '';
                if(m.status === 'watched') {
                    extraBadge = `<div class="absolute top-2 right-2 bg-slate-900/70 backdrop-blur text-white text-xs font-bold px-2 py-1 rounded-full flex items-center gap-1"><i data-lucide="star" class="w-3 h-3 fill-amber-400 text-amber-400"></i> ${m.rating}</div>`;
                }

                card.innerHTML = `
                    <div class="relative aspect-[2/3] bg-slate-200 w-full">
                        <img src="${m.poster}" class="w-full h-full object-cover">
                        ${extraBadge}
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-slate-800 text-sm leading-tight line-clamp-2 mb-1">${m.title}</h3>
                        <span class="text-[10px] font-semibold uppercase tracking-wider ${m.status === 'want' ? 'text-blue-500' : 'text-emerald-500'}">
                            ${m.status === 'want' ? 'Quero Assistir' : 'Assistido'}
                        </span>
                    </div>
                `;
                listDiv.appendChild(card);
            });
            lucide.createIcons();
        }

        function openMovieDetails(key) {
            const m = moviesData[key];
            if(!m) return;

            document.getElementById('det-title').innerText = m.title;
            
            const dateEl = document.getElementById('det-date');
            if(m.date) {
                const [y,mo,d] = m.date.split('-');
                dateEl.innerText = `📅 ${d}/${mo}/${y}`;
                dateEl.classList.remove('hidden');
            } else {
                dateEl.classList.add('hidden');
            }

            const statusEl = document.getElementById('det-status');
            statusEl.innerText = m.status === 'want' ? '🎬 Quero Assistir' : '✅ Assistido';
            statusEl.classList.remove('hidden');

            const ratingEl = document.getElementById('det-rating');
            if(m.status === 'watched') {
                ratingEl.innerHTML = `<i data-lucide="star" class="w-4 h-4 fill-amber-500"></i> ${m.rating}/5`;
                ratingEl.classList.remove('hidden');
            } else {
                ratingEl.classList.add('hidden');
            }

            document.getElementById('det-note').innerText = m.note || (m.status === 'want' ? 'Ainda não assistimos!' : 'Sem resenha...');
            
            const photoEl = document.getElementById('det-photo');
            if (m.photo) {
                photoEl.src = m.photo;
                photoEl.classList.remove('hidden');
            } else {
                photoEl.classList.add('hidden');
            }

            document.getElementById('det-delete-btn').onclick = () => {
                if(confirm('Remover este filme da lista?')) {
                    db.ref('movies/' + key).remove();
                    closeDetailsModal();
                }
            };

            document.getElementById('details-modal').classList.remove('hidden');
            lucide.createIcons();
        }


        // 7. CONTROLES DE INTERFACE (Abas e Modais)
        function switchTab(tab) {
            const viewMap = document.getElementById('view-map');
            const viewMovies = document.getElementById('view-movies');
            const tabMap = document.getElementById('tab-map');
            const tabMovies = document.getElementById('tab-movies');

            if(tab === 'map') {
                viewMap.classList.remove('hidden');
                viewMovies.classList.add('hidden');
                
                tabMap.classList.replace('text-slate-400', 'text-rose-500');
                tabMovies.classList.replace('text-rose-500', 'text-slate-400');
                setTimeout(() => map.invalidateSize(), 100); // Atualiza o tamanho do mapa ao reexibir
            } else {
                viewMap.classList.add('hidden');
                viewMovies.classList.remove('hidden');
                
                tabMovies.classList.replace('text-slate-400', 'text-rose-500');
                tabMap.classList.replace('text-rose-500', 'text-slate-400');
            }
        }

        // Funções de fechar/abrir modais
        function closeMemoryModal() { document.getElementById('memory-modal').classList.add('hidden'); }
        function closeDetailsModal() { document.getElementById('details-modal').classList.add('hidden'); }
        function openSettingsModal() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettingsModal() { document.getElementById('settings-modal').classList.add('hidden'); }
        function openMovieSearchModal() { document.getElementById('movie-search-modal').classList.remove('hidden'); searchInput.value=''; resultsDiv.innerHTML=''; setTimeout(()=>searchInput.focus(), 100); }
        function closeMovieSearchModal() { document.getElementById('movie-search-modal').classList.add('hidden'); }
        function closeMovieFormModal() { document.getElementById('movie-form-modal').classList.add('hidden'); }

    </script>
</body>
</html>
